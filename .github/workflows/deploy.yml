name: Deploy

on:
  push:
    branches:
      - main

env:
  FLY_APP: secret-store-chrisvouga
  CUSTOM_DOMAIN: secret-store.chrisvouga.dev

jobs:
  provision-dns:
    name: Provision DNS
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Cloudflare CNAME record exists
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail

          CF_API_TOKEN="$(printf '%s' "${CF_API_TOKEN}" | tr -d '\n\r')"
          if [ -z "$CF_API_TOKEN" ]; then
            echo "ERROR: CF_API_TOKEN secret is empty" >&2
            exit 1
          fi

          FLY_HOST="${FLY_APP}.fly.dev"
          CF_ZONE_NAME="${CUSTOM_DOMAIN#*.}"
          CF_RECORD_NAME="${CUSTOM_DOMAIN%%.${CF_ZONE_NAME}}"

          cf_api() {
            local method="$1"
            local url="$2"
            local data="${3:-}"
            local response http_code body

            if [ -n "$data" ]; then
              response="$(curl -sS -w "\n__HTTP__:%{http_code}" -X "$method" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "$url" --data "$data")"
            else
              response="$(curl -sS -w "\n__HTTP__:%{http_code}" -X "$method" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "$url")"
            fi

            http_code="${response##*__HTTP__:}"
            body="${response%__HTTP__:*}"

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "ERROR: Cloudflare API ${method} ${url} returned HTTP ${http_code}" >&2
              echo "$body" | jq . >&2 2>/dev/null || echo "$body" >&2
              exit 1
            fi

            printf '%s' "$body"
          }

          echo "==> Verifying Cloudflare API token..."
          VERIFY="$(cf_api GET "https://api.cloudflare.com/client/v4/user/tokens/verify")"
          if ! echo "$VERIFY" | jq -e '.success == true' >/dev/null; then
            echo "ERROR: CF_API_TOKEN is invalid (use a Zone:DNS:Edit API token, not Wrangler OAuth)" >&2
            echo "$VERIFY" | jq . >&2
            exit 1
          fi

          echo "==> Looking up Cloudflare zone: ${CF_ZONE_NAME}..."
          ZONES="$(cf_api GET "https://api.cloudflare.com/client/v4/zones?name=${CF_ZONE_NAME}")"
          CF_ZONE_ID="$(echo "$ZONES" | jq -r '.result[0].id // empty')"

          if [ -z "$CF_ZONE_ID" ]; then
            echo "ERROR: Could not find Cloudflare zone for ${CF_ZONE_NAME}" >&2
            echo "$ZONES" | jq . >&2
            exit 1
          fi
          echo "Found zone ID: ${CF_ZONE_ID}"

          EXISTING="$(cf_api GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${CF_RECORD_NAME}")"

          RECORD_ID="$(echo "$EXISTING" | jq -r --arg name "${CF_RECORD_NAME}" --arg fqdn "${CUSTOM_DOMAIN}" \
            '.result[] | select(.name == $name or .name == $fqdn) | .id' | head -n 1)"

          if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
            echo "CNAME record already exists for ${CUSTOM_DOMAIN} (id: ${RECORD_ID})"
            exit 0
          fi

          echo "Creating CNAME ${CF_RECORD_NAME} -> ${FLY_HOST}..."
          RESPONSE="$(cf_api POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" "{
            \"type\": \"CNAME\",
            \"name\": \"${CF_RECORD_NAME}\",
            \"content\": \"${FLY_HOST}\",
            \"proxied\": false,
            \"ttl\": 1
          }")"

          if ! echo "$RESPONSE" | jq -e '.success == true' >/dev/null; then
            echo "Failed to create DNS record:" >&2
            echo "$RESPONSE" | jq . >&2
            exit 1
          fi

          echo "Created CNAME record for ${CUSTOM_DOMAIN}"

  migrate-db:
    name: Run DB Migrations
    needs: provision-dns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run migrations
        env:
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh

  deploy:
    name: Deploy to Fly.io
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app "${FLY_APP}"

  issue-tls:
    name: Issue TLS Certificate
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Add certificate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if flyctl certs list --app "${FLY_APP}" | grep -q "${CUSTOM_DOMAIN}"; then
            echo "Certificate for ${CUSTOM_DOMAIN} already registered"
          else
            flyctl certs add "${CUSTOM_DOMAIN}" --app "${FLY_APP}"
          fi

      - name: Wait for certificate to become ready
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            STATUS="$(flyctl certs check "${CUSTOM_DOMAIN}" --app "${FLY_APP}" 2>&1 || true)"
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "ready"; then
              echo "Certificate is ready"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Certificate did not become ready within 30 minutes" >&2
              exit 1
            fi
            sleep 30
          done

  smoke-test:
    name: Smoke Test
    needs: issue-tls
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke test
        env:
          BAO_ADDR: https://${{ env.CUSTOM_DOMAIN }}
          BAO_TOKEN: ${{ secrets.BAO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BAO_TOKEN}" ]; then
            echo "BAO_TOKEN not configured — skipping smoke test (add after running init.sh)"
            exit 0
          fi

          VERSION="$(curl -sf https://api.github.com/repos/openbao/openbao/releases/latest | jq -r .tag_name)"
          curl -fsSL "https://github.com/openbao/openbao/releases/download/${VERSION}/bao_${VERSION#v}_linux_amd64.tar.gz" -o bao.tar.gz
          tar -xzf bao.tar.gz
          sudo install -m 755 bao /usr/local/bin/bao

          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh
