name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FLY_APP: vault
  CUSTOM_DOMAIN: vault.chrisvouga.dev

jobs:
  changes:
    name: Detect deploy-relevant changes
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Only files baked into the Fly.io image (or its deploy config) should
      # trigger a redeploy. A redeploy restarts the machine and SEALS OpenBao,
      # forcing the unseal job to run — so we skip it when nothing relevant
      # changed to avoid unnecessary seals.
      - name: Filter deploy-relevant paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - 'Dockerfile'
              - 'docker-entrypoint.sh'
              - 'config/openbao.hcl'
              - 'fly.toml'

  provision-dns:
    name: Provision DNS
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Cloudflare CNAME record exists
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail

          CF_API_TOKEN="$(printf '%s' "${CF_API_TOKEN}" | tr -d '\n\r')"
          if [ -z "$CF_API_TOKEN" ]; then
            echo "ERROR: CF_API_TOKEN secret is empty" >&2
            exit 1
          fi

          FLY_HOST="${FLY_APP}.fly.dev"
          CF_ZONE_NAME="${CUSTOM_DOMAIN#*.}"

          cf_api() {
            local method="$1"
            local url="$2"
            local data="${3:-}"
            local response http_code body

            if [ -n "$data" ]; then
              response="$(curl -sS -w "\n__HTTP__:%{http_code}" -X "$method" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "$url" --data "$data")"
            else
              response="$(curl -sS -w "\n__HTTP__:%{http_code}" -X "$method" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "$url")"
            fi

            http_code="${response##*__HTTP__:}"
            body="${response%__HTTP__:*}"

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "ERROR: Cloudflare API ${method} ${url} returned HTTP ${http_code}" >&2
              echo "$body" | jq . >&2 2>/dev/null || echo "$body" >&2
              exit 1
            fi

            printf '%s' "$body"
          }

          normalize_dns_target() {
            printf '%s' "$1" | sed 's/\.$//'
          }

          cname_targets_match() {
            local existing="$1"
            local desired="$2"
            [ "$(normalize_dns_target "$existing")" = "$(normalize_dns_target "$desired")" ]
          }

          echo "==> Verifying Cloudflare API token..."
          VERIFY="$(cf_api GET "https://api.cloudflare.com/client/v4/user/tokens/verify")"
          if ! echo "$VERIFY" | jq -e '.success == true' >/dev/null; then
            echo "ERROR: CF_API_TOKEN is invalid (use a Zone:DNS:Edit API token, not Wrangler OAuth)" >&2
            echo "$VERIFY" | jq . >&2
            exit 1
          fi

          echo "==> Looking up Cloudflare zone: ${CF_ZONE_NAME}..."
          ZONES="$(cf_api GET "https://api.cloudflare.com/client/v4/zones?name=${CF_ZONE_NAME}")"
          CF_ZONE_ID="$(echo "$ZONES" | jq -r '.result[0].id // empty')"

          if [ -z "$CF_ZONE_ID" ]; then
            echo "ERROR: Could not find Cloudflare zone for ${CF_ZONE_NAME}" >&2
            echo "$ZONES" | jq . >&2
            exit 1
          fi
          echo "Found zone ID: ${CF_ZONE_ID}"

          echo "==> Ensuring CNAME ${CUSTOM_DOMAIN} -> ${FLY_HOST}..."
          EXISTING="$(cf_api GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${CUSTOM_DOMAIN}")"
          RECORD_ID="$(echo "$EXISTING" | jq -r '.result[0].id // empty')"
          RECORD_TYPE="$(echo "$EXISTING" | jq -r '.result[0].type // empty')"
          RECORD_CONTENT="$(echo "$EXISTING" | jq -r '.result[0].content // empty')"

          if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
            if [ "$RECORD_TYPE" = "CNAME" ]; then
              if cname_targets_match "$RECORD_CONTENT" "$FLY_HOST"; then
                echo "CNAME already exists and points to ${FLY_HOST} (id: ${RECORD_ID})"
                exit 0
              fi
              echo "Updating CNAME (id: ${RECORD_ID}) to point to ${FLY_HOST}..."
              RESPONSE="$(cf_api PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" "{
                \"type\": \"CNAME\",
                \"name\": \"${CUSTOM_DOMAIN}\",
                \"content\": \"${FLY_HOST}\",
                \"proxied\": false,
                \"ttl\": 1
              }")"
              if echo "$RESPONSE" | jq -e '.success == true' >/dev/null; then
                echo "Updated CNAME record for ${CUSTOM_DOMAIN}"
                exit 0
              fi
              echo "Failed to update DNS record:" >&2
              echo "$RESPONSE" | jq . >&2
              exit 1
            fi
            echo "DNS record already exists for ${CUSTOM_DOMAIN} (type: ${RECORD_TYPE}, id: ${RECORD_ID})"
            echo "Leaving unchanged — idempotent skip."
            exit 0
          fi

          echo "Creating CNAME ${CUSTOM_DOMAIN} -> ${FLY_HOST}..."
          CREATE_RESPONSE="$(curl -sS -w "\n__HTTP__:%{http_code}" -X POST \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            --data "{
              \"type\": \"CNAME\",
              \"name\": \"${CUSTOM_DOMAIN}\",
              \"content\": \"${FLY_HOST}\",
              \"proxied\": false,
              \"ttl\": 1
            }")"
          CREATE_HTTP="${CREATE_RESPONSE##*__HTTP__:}"
          CREATE_BODY="${CREATE_RESPONSE%__HTTP__:*}"

          if [ "$CREATE_HTTP" -ge 200 ] && [ "$CREATE_HTTP" -lt 300 ] \
            && echo "$CREATE_BODY" | jq -e '.success == true' >/dev/null; then
            echo "Created CNAME record for ${CUSTOM_DOMAIN}"
            exit 0
          fi

          if [ "$CREATE_HTTP" -eq 400 ] \
            && echo "$CREATE_BODY" | jq -e '.errors[]? | select(.code == 81053)' >/dev/null 2>&1; then
            echo "CNAME record already exists for ${CUSTOM_DOMAIN} (Cloudflare 81053) — idempotent skip."
            exit 0
          fi

          echo "ERROR: Failed to create DNS record (HTTP ${CREATE_HTTP})" >&2
          echo "$CREATE_BODY" | jq . >&2 2>/dev/null || echo "$CREATE_BODY" >&2
          exit 1

  migrate-db:
    name: Run DB Migrations
    needs: provision-dns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run migrations
        env:
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh

  deploy:
    name: Deploy to Fly.io
    needs: [migrate-db, changes]
    # Skip the redeploy (and the seal it causes) unless image/deploy inputs
    # changed. A manual run always forces a deploy.
    if: ${{ needs.changes.outputs.deploy == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          flyctl deploy --remote-only --app "${FLY_APP}"
          flyctl scale count 1 --app "${FLY_APP}" --yes

  unseal:
    name: Unseal OpenBao
    needs: [deploy, issue-tls]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release jq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Unseal OpenBao
        env:
          VAULT_ADDR: https://${{ env.CUSTOM_DOMAIN }}
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/install-vault-cli.sh scripts/repair-openbao-auth-mounts.sh scripts/unseal.sh
          ./scripts/install-vault-cli.sh
          ./scripts/repair-openbao-auth-mounts.sh
          ./scripts/unseal.sh

  issue-tls:
    name: Issue TLS Certificate
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Add certificate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if flyctl certs list --app "${FLY_APP}" 2>/dev/null | grep -Fq "${CUSTOM_DOMAIN}"; then
            echo "Certificate for ${CUSTOM_DOMAIN} already registered"
          else
            if ! flyctl certs add "${CUSTOM_DOMAIN}" --app "${FLY_APP}" 2>&1; then
              if flyctl certs list --app "${FLY_APP}" 2>/dev/null | grep -Fq "${CUSTOM_DOMAIN}"; then
                echo "Certificate for ${CUSTOM_DOMAIN} already registered (race/idempotent skip)"
              else
                exit 1
              fi
            fi
          fi

      - name: Wait for certificate to become ready
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            STATUS="$(flyctl certs check "${CUSTOM_DOMAIN}" --app "${FLY_APP}" 2>&1 || true)"
            echo "$STATUS"
            if echo "$STATUS" | grep -Eiq 'verified and active|status[[:space:]]*=[[:space:]]*issued|ready|valid'; then
              echo "Certificate is ready"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Certificate did not become ready within 30 minutes" >&2
              exit 1
            fi
            sleep 30
          done

  smoke-test:
    name: Smoke Test
    needs: [unseal, issue-tls]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release jq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run smoke test
        env:
          VAULT_ADDR: https://${{ env.CUSTOM_DOMAIN }}
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/install-vault-cli.sh scripts/fetch-vault-token.sh scripts/smoke-test.sh
          ./scripts/install-vault-cli.sh
          export VAULT_TOKEN="$(./scripts/fetch-vault-token.sh)"
          ./scripts/smoke-test.sh
